# ==================== 商品上下架说明 ====================
# 
# 📋 如何管理商品上下架：
#
# ✅ 上架商品：将 status 设置为 "on"
#    例：status: on
#
# ❌ 下架商品：将 status 设置为 "off"  
#    例：status: off
#
# 📝 草稿状态：将 status 设置为 "draft"（前台不显示）
#    例：status: draft
#
# 💰 价格设置：
#    - price: 当前售价（必填，数字类型）
#    - original_price: 原价/划线价（选填，用于显示折扣）
#    - 价格为0时显示"咨询报价"
#
# 🖼️ 图片设置：
#    - image_path: 图片相对路径（相对于 images/products/ 目录）
#    - 支持格式：jpg, png, webp, gif
#    - 建议尺寸：800×600px 以上
#    - 图片需放置在 images/products/ 对应分类目录下
#
# 🏷️ 标签设置：
#    - badge: 商品标签（选填）
#    - 可选值："热销"、"新品"、"限时"、"限量"、""（空表示无标签）
#
# ==================== 网站其他设置 ====================
settings:
  # 是否启用商品筛选功能
  enable_filter: true
  
  # 每页显示商品数量
  products_per_page: 12
  
  # 是否显示原价
  show_original_price: true
  
  # 是否显示销量
  show_sales: true
  
  # 联系表单是否必填邮箱
  email_required: false
  
  # 网站备案号
  icp: "闽ICP备XXXXXXX号"
  
  # 统计代码（如百度统计）
  analytics_code: ""